name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint (ruff)
        run: ruff check defense forensics tests
      - name: Install forensics deps (verified OSS parsers)
        run: pip install -r requirements-forensics.txt
      - name: Run tests (defense stdlib + forensics adapters)
        run: python -m unittest discover -s tests -v
